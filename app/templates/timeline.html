<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ title }}</title>
    <!-- MD5 Library for the Gravatar Bonus -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], input[type="email"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background: #0056b3; }
        
        .post { display: flex; align-items: flex-start; border-bottom: 1px solid #eee; padding: 15px 0; }
        .post:last-child { border-bottom: none; }
        .avatar { border-radius: 50%; width: 50px; height: 50px; margin-right: 15px; }
        .post-content { flex: 1; }
        .post-header { margin: 0 0 5px 0; font-size: 18px; color: #333; }
        .post-date { font-size: 12px; color: #888; margin-bottom: 10px; display: block; }
        .post-body { margin: 0; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <a href="/">← Back to Home</a>
    <h1>Timeline</h1>
    
    <!-- Timeline Form -->
    <div class="card">
        <h3>Create a Post</h3>
        <form id="timeline-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="4" required></textarea>
            </div>
            <button type="submit">Submit Post</button>
        </form>
    </div>

    <!-- Timeline Posts Container -->
    <div class="card" id="posts-container">
        <!-- Posts will be injected here by JS -->
    </div>
</div>

<script>
    // 1. Fetch and display existing posts on page load
    async function loadPosts() {
        const container = document.getElementById('posts-container');
        container.innerHTML = '<p>Loading posts...</p>';
        
        try {
            const response = await fetch('/api/timeline_post');
            const data = await response.json();
            const posts = data.timeline_posts;
            
            container.innerHTML = ''; // clear loading text
            
            if(posts.length === 0) {
                container.innerHTML = '<p>No posts yet. Be the first!</p>';
                return;
            }

            posts.forEach(post => {
                const gravatarHash = md5(post.email.trim().toLowerCase());
                const gravatarUrl = `https://www.gravatar.com/avatar/${gravatarHash}?d=identicon`;
                
                const postHtml = `
                    <div class="post">
                        <img src="${gravatarUrl}" class="avatar" alt="${post.name}'s avatar">
                        <div class="post-content">
                            <h4 class="post-header">${post.name}</h4>
                            <span class="post-date">${new Date(post.created_at).toLocaleString()}</span>
                            <p class="post-body">${post.content}</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', postHtml);
            });
        } catch (error) {
            console.error('Error fetching posts:', error);
            container.innerHTML = '<p>Error loading posts.</p>';
        }
    }

    // 2. Override the form submission to use fetch API
    document.getElementById('timeline-form').addEventListener('submit', async function(e) {
        e.preventDefault(); // Prevent standard page reload

        const formData = new FormData(this);
        
        try {
            const response = await fetch('/api/timeline_post', {
                method: 'POST',
                body: formData
            });
            
            if(response.ok) {
                // Clear the form and reload the posts to show the new one
                this.reset();
                loadPosts();
            } else {
                alert("Something went wrong saving your post.");
            }
        } catch (error) {
            console.error('Error saving post:', error);
        }
    });

    // Load posts initially
    loadPosts();
</script>

</body>
</html>
