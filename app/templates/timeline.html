<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      text-align: center;
    }

    form, .post {
      background: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .meta {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Timeline</h1>

  <form id="timeline-form">
    <label>Name</label>
    <input type="text" id="name" name="name" required>

    <label>Email</label>
    <input type="email" id="email" name="email" required>

    <label>Content</label>
    <textarea id="content" name="content" required></textarea>

    <button type="submit">Add Timeline Post</button>
  </form>

  <h2>Posts</h2>
  <div id="posts"></div>

  <script>
    async function loadPosts() {
      const response = await fetch('/api/timeline_post');
      const data = await response.json();

      const postsDiv = document.getElementById('posts');
      postsDiv.innerHTML = '';

      data.timeline_posts.forEach(post => {
        const postEl = document.createElement('div');
        postEl.className = 'post';
        postEl.innerHTML = `
          <h3>${post.name}</h3>
          <p class="meta">${post.email} • ${post.created_at}</p>
          <p>${post.content}</p>
        `;
        postsDiv.appendChild(postEl);
      });
    }

    document.getElementById('timeline-form').addEventListener('submit', async function(event) {
      event.preventDefault();

      const formData = new FormData();
      formData.append('name', document.getElementById('name').value);
      formData.append('email', document.getElementById('email').value);
      formData.append('content', document.getElementById('content').value);

      await fetch('/api/timeline_post', {
        method: 'POST',
        body: formData
      });

      document.getElementById('timeline-form').reset();
      await loadPosts();
    });

    loadPosts();
  </script>
</body>
</html>
